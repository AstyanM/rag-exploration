# ──────────────────────────────────────────────
# Default RAG Pipeline Configuration
# ──────────────────────────────────────────────

llm:
  provider: ollama
  model: mistral:7b
  temperature: 0.0
  top_p: 0.9
  num_ctx: 4096

embeddings:
  provider: ollama
  model: mxbai-embed-large
  registry_key: mxbai_large

chunking:
  strategy: recursive
  chunk_size: 1000
  chunk_overlap: 200
  separators:
    - "\n\n"
    - "\n"
    - " "
    - ""

vectorstore:
  provider: chroma
  persist_directory: ./vectorstore/chroma_db
  collection_name: langchain_docs

retrieval:
  strategy: hybrid
  dense:
    search_type: similarity
    k: 10
    fetch_k: 20
    lambda_mult: 0.7
  sparse:
    k: 10
  hybrid:
    weights: [0.5, 0.5]
  final_k: 5

reranking:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 5

query_translation:
  enabled: false
  strategy: none
  multi_query:
    num_queries: 3
  hyde:
    num_generations: 1

routing:
  enabled: false
  strategy: semantic
  collections:
    - name: tutorials
      description: "Step-by-step guides and tutorials"
    - name: api_reference
      description: "API documentation and class references"
    - name: concepts
      description: "Conceptual explanations and architecture"

generation:
  prompt_template: |
    Answer the following question using ONLY the provided context.
    If the context does not contain enough information, say so.
    Be concise and accurate.

    Context:
    {context}

    Question: {question}

    Answer:

evaluation:
  dataset_path: ./data/evaluation/benchmark_retrieval.json
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall

scraping:
  source: github
  github_repo: langchain-ai/docs
  github_docs_path: src/oss
  include_integrations: false
  output_dir: ./data/raw
